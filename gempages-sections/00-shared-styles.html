<!-- ============================================================
  POUNDS MEDICAL — SHARED STYLES
  Paste this block ONCE at the very top of your GemPages layout,
  before any other Pounds section block.
  All other section blocks depend on these variables + font.
============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --pt-cream:     #f1f4ed;
    --pt-coral:     #e26d5c;
    --pt-coral-dk:  #cf5e4d;
    --pt-sage:      #ebedd8;
    --pt-green:     #2d381b;
    --pt-green-mid: #2f5233;
    --pt-ivory:     #fff1dd;
    --pt-amber:     #ffdea9;
    --pt-sage-gray: #cecdb6;
    --pt-sage-lt:   #d6ddd0;
    --pt-muted:     #484947;
    --pt-font-head: 'Georgia', 'Times New Roman', serif;
    --pt-font-body: 'Inter', Helvetica, Arial, sans-serif;
    --pt-max-w:     1240px;
    --pt-px:        32px;
  }
  *, *::before, *::after { box-sizing: border-box; }
  img { max-width: 100%; display: block; }

  /* Shared scroll-fade */
  .pt-cp-fade {
    opacity: 0;
    transform: translateY(22px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .pt-cp-fade.visible { opacity: 1; transform: translateY(0); }
  .pt-cp-fade--d1     { transition-delay: 0.12s; }
  .pt-cp-fade--d2     { transition-delay: 0.24s; }
  .pt-cp-fade--d3     { transition-delay: 0.36s; }

  /* Shared type */
  .pt-cp-eyebrow {
    font-family: var(--pt-font-body);
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--pt-coral); margin-bottom: 10px;
  }
  .pt-cp-h2 {
    font-family: var(--pt-font-head);
    font-size: clamp(26px, 3.5vw, 40px);
    line-height: 1.15; color: var(--pt-green);
    margin-bottom: 18px; letter-spacing: -0.02em;
  }
  .pt-cp-body { font-family: var(--pt-font-body); font-size: 16px; line-height: 1.75; color: var(--pt-muted); }
  .pt-cp-inner { max-width: var(--pt-max-w); margin: 0 auto; }
  .pt-cp-section { padding: 100px var(--pt-px); }

  @media (max-width: 900px) {
    .pt-cp-section { padding: 70px 20px; }
    :root { --pt-px: 20px; }
  }
  @media (max-width: 600px) {
    :root { --pt-px: 20px; }
  }
</style>

<script>
(function () {
  /* Global scroll-fade observer — runs once, picks up all .pt-cp-fade elements */
  if (window.__ptFadeInit) return;
  window.__ptFadeInit = true;
  function initFade() {
    var els = Array.prototype.slice.call(document.querySelectorAll('.pt-cp-fade'));
    if (!('IntersectionObserver' in window)) {
      els.forEach(function (el) { el.classList.add('visible'); });
      return;
    }
    var obs = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    els.forEach(function (el) { obs.observe(el); });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initFade);
  } else { initFade(); }
}());
</script>
